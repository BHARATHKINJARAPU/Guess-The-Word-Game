<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>WordWeaver | Guess the Word Game</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, 'Segoe UI', 'Inter', 'Poppins', -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(145deg, #f0f4fa 0%, #d9e0eb 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    /* main game card */
    .game-container {
      max-width: 650px;
      width: 100%;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(2px);
      border-radius: 3rem;
      box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.35), 0 4px 12px rgba(0, 0, 0, 0.05);
      padding: 1.8rem 2rem 2.2rem;
      transition: all 0.2s ease;
      border: 1px solid rgba(255,255,255,0.6);
    }

    h1 {
      font-size: 2.1rem;
      font-weight: 700;
      background: linear-gradient(135deg, #1F2B48, #2c3e66);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      letter-spacing: -0.3px;
      text-align: center;
      margin-bottom: 0.2rem;
    }

    .sub {
      text-align: center;
      font-weight: 500;
      color: #4a627a;
      border-bottom: 2px dotted #cbd5e1;
      display: inline-block;
      width: auto;
      margin: 0 auto 1.2rem;
      padding-bottom: 6px;
      font-size: 0.85rem;
    }

    /* player section */
    .player-area {
      background: #eef3fc;
      border-radius: 2rem;
      padding: 0.9rem 1.2rem;
      margin-bottom: 1.8rem;
      display: flex;
      flex-wrap: wrap;
      align-items: flex-end;
      gap: 1rem;
      justify-content: space-between;
      box-shadow: inset 0 1px 3px #0001, 0 4px 8px #0001;
    }

    .player-field {
      flex: 2;
      min-width: 150px;
    }

    .player-field label {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #2c4c6e;
      display: block;
      margin-bottom: 5px;
    }

    .player-field input {
      width: 100%;
      padding: 10px 14px;
      border-radius: 40px;
      border: 1px solid #bfd4e9;
      background: white;
      font-weight: 500;
      font-size: 0.95rem;
      outline: none;
      transition: 0.2s;
    }

    .player-field input:focus {
      border-color: #3b7cbf;
      box-shadow: 0 0 0 3px rgba(59,124,191,0.2);
    }

    .player-badge {
      background: #1e2f41;
      color: white;
      padding: 0.3rem 1rem;
      border-radius: 40px;
      font-size: 0.85rem;
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    /* scores dashboard */
    .score-panel {
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      background: #ffffffcc;
      backdrop-filter: blur(4px);
      padding: 0.9rem 1.2rem;
      border-radius: 2rem;
      margin-bottom: 2rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.02), inset 0 1px 0 white;
    }

    .score-card {
      background: white;
      border-radius: 1.5rem;
      padding: 0.4rem 1rem;
      text-align: center;
      flex: 1;
      box-shadow: 0 5px 10px rgba(0, 0, 0, 0.05);
      border: 1px solid #e2edf7;
    }

    .score-label {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      color: #4d6a8f;
      letter-spacing: 0.5px;
    }

    .score-value {
      font-size: 2rem;
      font-weight: 800;
      line-height: 1;
      color: #1f2e45;
    }

    .highest {
      color: #c9771e;
    }

    /* word display */
    .word-mystery {
      background: #0b1825;
      border-radius: 2.5rem;
      padding: 1.2rem 0.8rem;
      text-align: center;
      margin-bottom: 1.5rem;
      letter-spacing: 0.3rem;
      box-shadow: inset 0 1px 3px #ffffff20, 0 12px 20px -10px rgba(0,0,0,0.3);
    }

    .word-letters {
      font-size: 2.5rem;
      font-weight: 700;
      font-family: 'Fira Mono', 'Courier New', monospace;
      color: #f3f9ff;
      text-shadow: 0 2px 5px #00000030;
      word-break: break-word;
    }

    .hint-area {
      text-align: center;
      background: #e9f0f5;
      border-radius: 60px;
      width: fit-content;
      margin: 0 auto 1.2rem auto;
      padding: 0.4rem 1.5rem;
      font-weight: 600;
      color: #2c4b6e;
    }

    /* attempts and feedback */
    .attempts-info {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin: 1rem 0 1rem;
      flex-wrap: wrap;
      gap: 0.8rem;
    }

    .badge-attempt {
      background: #1e2f3c;
      color: white;
      padding: 0.3rem 1.2rem;
      border-radius: 60px;
      font-weight: 600;
      font-size: 0.9rem;
    }

    .message-area {
      background: #ffffffd9;
      padding: 0.5rem 1rem;
      border-radius: 2rem;
      font-weight: 500;
      color: #17466b;
      font-size: 0.9rem;
      flex: 1;
      text-align: center;
    }

    /* guess input & controls */
    .guess-section {
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem;
      margin: 1rem 0 1.3rem;
    }

    .guess-input {
      flex: 3;
      padding: 12px 16px;
      border-radius: 60px;
      border: 1px solid #cbdde9;
      font-size: 1rem;
      font-weight: 500;
      background: white;
      transition: 0.2s;
    }

    .guess-input:focus {
      border-color: #3b7cbf;
      outline: none;
      box-shadow: 0 0 0 2px #7cafe6;
    }

    button {
      background: #2c3e66;
      border: none;
      padding: 0 1.2rem;
      border-radius: 60px;
      font-weight: 600;
      font-size: 0.9rem;
      color: white;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 3px 5px rgba(0,0,0,0.1);
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    button:active {
      transform: scale(0.96);
    }

    button:hover {
      background: #1f2e4a;
      filter: brightness(1.02);
    }

    .btn-secondary {
      background: #4c6a8a;
    }
    .btn-secondary:hover {
      background: #2c4b6e;
    }
    .btn-restart {
      background: #a55728;
    }
    .btn-restart:hover {
      background: #8c431f;
    }

    .action-buttons {
      display: flex;
      gap: 0.8rem;
      justify-content: flex-end;
    }

    hr {
      margin: 1.2rem 0 0.5rem;
      border-color: #d4e2f0;
    }

    footer {
      font-size: 0.7rem;
      text-align: center;
      margin-top: 1.2rem;
      color: #6b88a2;
    }

    @media (max-width: 520px) {
      .game-container {
        padding: 1.3rem;
      }
      .word-letters {
        font-size: 1.8rem;
        letter-spacing: 0.2rem;
      }
      .score-value {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>

<div class="game-container" id="gameRoot">
  <h1>🔤 GUESS THE WORD</h1>
  <div style="text-align: center;"><span class="sub">✧ letter by letter ✧</span></div>

  <!-- Player management -->
  <div class="player-area">
    <div class="player-field">
      <label>👤 PLAYER ID / NAME</label>
      <input type="text" id="playerIdInput" placeholder="e.g., ALEX_99" maxlength="20" autocomplete="off">
    </div>
    <div>
      <div class="player-badge" id="playerBadgeDisplay">🎮 Guest Mode</div>
    </div>
  </div>

  <!-- Scoreboard -->
  <div class="score-panel">
    <div class="score-card"><div class="score-label">🏆 CURRENT SCORE</div><div class="score-value" id="currentScoreDisplay">0</div></div>
    <div class="score-card"><div class="score-label">📋 PREVIOUS SCORE</div><div class="score-value" id="prevScoreDisplay">0</div></div>
    <div class="score-card"><div class="score-label">⭐ HIGHEST SCORE</div><div class="score-value highest" id="highestScoreDisplay">0</div></div>
  </div>

  <!-- Hint & hidden word -->
  <div class="hint-area">💡 HINT: <span id="hintText">fruit with a peel</span></div>
  <div class="word-mystery">
    <div class="word-letters" id="hiddenWordDisplay">_ _ _ _ _</div>
  </div>

  <!-- attempts and feedback -->
  <div class="attempts-info">
    <div class="badge-attempt" id="attemptsLeftDisplay">❌ Attempts left: 6</div>
    <div class="message-area" id="gameMessage">✨ Guess a letter or the full word!</div>
  </div>

  <!-- guess controls -->
  <div class="guess-section">
    <input type="text" id="guessInput" class="guess-input" placeholder="Enter a letter or whole word..." maxlength="20" autocomplete="off">
    <button id="submitGuessBtn">🔍 GUESS</button>
  </div>

  <div class="action-buttons">
    <button id="restartGameBtn" class="btn-restart">🔄 RESTART GAME</button>
  </div>
  <hr />
  <footer>✔ incorrect guesses limit → score based on remaining attempts</footer>
</div>

<script>
  // ----------------------------- WORD BANK ---------------------------------
  const WORD_SET = [
    { word: "APPLE", hint: "fruit with a peel, keeps doctor away" },
    { word: "MOON", hint: "earth's natural satellite, glows at night" },
    { word: "PYTHON", hint: "snake or programming language" },
    { word: "JAVASCRIPT", hint: "language of the web, runs in browsers" },
    { word: "GITHUB", hint: "platform for code collaboration" },
    { word: "KEYBOARD", hint: "typing device with QWERTY layout" },
    { word: "NEBULA", hint: "interstellar cloud of dust and gas" }
  ];

  // Helper: pick random word object
  function getRandomWordObj() {
    return JSON.parse(JSON.stringify(WORD_SET[Math.floor(Math.random() * WORD_SET.length)]));
  }

  // ----------------------------- GAME STATE --------------------------------
  let currentWordObj = null;     // { word, hint }
  let currentWord = "";          // uppercase string
  let guessedLetters = new Set(); // store correctly guessed letters (case insensitive)
  let incorrectGuesses = 0;
  let maxAttempts = 6;
  let gameActive = true;          // if game is over (win/loss) no more guesses until restart
  let currentScore = 0;
  let previousScore = 0;
  let highestScore = 0;
  let currentPlayerId = "Guest";

  // DOM elements
  const hiddenWordDisplay = document.getElementById("hiddenWordDisplay");
  const hintTextSpan = document.getElementById("hintText");
  const attemptsLeftSpan = document.getElementById("attemptsLeftDisplay");
  const gameMessageSpan = document.getElementById("gameMessage");
  const guessInput = document.getElementById("guessInput");
  const submitBtn = document.getElementById("submitGuessBtn");
  const restartBtn = document.getElementById("restartGameBtn");
  const currentScoreDisplay = document.getElementById("currentScoreDisplay");
  const prevScoreDisplay = document.getElementById("prevScoreDisplay");
  const highestScoreDisplay = document.getElementById("highestScoreDisplay");
  const playerIdInput = document.getElementById("playerIdInput");
  const playerBadgeSpan = document.getElementById("playerBadgeDisplay");

  // ----------------------------- LOCALSTORAGE KEYS -------------------------
  const STORAGE_HIGHEST_KEY = "guessWord_highestScore";
  const STORAGE_PREV_KEY_PREFIX = "guessWord_prevScore_";

  // Load highest score from localStorage (global highest)
  function loadHighestScoreFromStorage() {
    const stored = localStorage.getItem(STORAGE_HIGHEST_KEY);
    if (stored !== null && !isNaN(parseInt(stored))) {
      highestScore = parseInt(stored);
    } else {
      highestScore = 0;
    }
    highestScoreDisplay.innerText = highestScore;
  }

  // Save highest score globally
  function saveHighestScoreToStorage() {
    localStorage.setItem(STORAGE_HIGHEST_KEY, highestScore);
    highestScoreDisplay.innerText = highestScore;
  }

  // load previous score for specific player
  function loadPrevScoreForPlayer(playerId) {
    if (!playerId || playerId.trim() === "") {
      previousScore = 0;
      prevScoreDisplay.innerText = "0";
      return;
    }
    const key = STORAGE_PREV_KEY_PREFIX + playerId;
    const storedPrev = localStorage.getItem(key);
    if (storedPrev !== null && !isNaN(parseInt(storedPrev))) {
      previousScore = parseInt(storedPrev);
    } else {
      previousScore = 0;
    }
    prevScoreDisplay.innerText = previousScore;
  }

  // save current score as previous for this player (called when game ends or player changes? but mainly at game over / restart)
  function saveCurrentScoreAsPreviousForPlayer(playerId) {
    if (!playerId || playerId.trim() === "") return;
    const key = STORAGE_PREV_KEY_PREFIX + playerId;
    localStorage.setItem(key, currentScore);
    previousScore = currentScore;
    prevScoreDisplay.innerText = previousScore;
  }

  // update global highest score if currentScore exceeds it
  function updateGlobalHighestScore() {
    if (currentScore > highestScore) {
      highestScore = currentScore;
      saveHighestScoreToStorage();
    }
  }

  // compute score based on remaining attempts (incorrect guesses left)
  function computeScoreFromAttempts() {
    const remainingAttempts = maxAttempts - incorrectGuesses;
    // score = remaining attempts * 10 (bonus: full word factor but simple)
    let newScore = remainingAttempts * 10;
    if (newScore < 0) newScore = 0;
    return newScore;
  }

  function refreshScoreUI() {
    currentScore = computeScoreFromAttempts();
    currentScoreDisplay.innerText = currentScore;
    // update highest (in case current becomes new high while playing)
    if (gameActive && currentScore > highestScore) {
      highestScore = currentScore;
      saveHighestScoreToStorage();
    }
    highestScoreDisplay.innerText = highestScore;
  }

  // generate masked word display based on guessedLetters
  function generateMaskedWord() {
    let masked = "";
    for (let ch of currentWord) {
      if (guessedLetters.has(ch)) {
        masked += ch + " ";
      } else {
        masked += "_ ";
      }
    }
    return masked.trim();
  }

  function updateUI() {
    // update masked word display
    hiddenWordDisplay.innerText = generateMaskedWord() || "?";
    // update attempts left display
    const attemptsLeft = maxAttempts - incorrectGuesses;
    attemptsLeftSpan.innerText = `❌ Attempts left: ${attemptsLeft}`;
    refreshScoreUI();
  }

  // check win condition
  function checkWin() {
    for (let ch of currentWord) {
      if (!guessedLetters.has(ch)) return false;
    }
    return true;
  }

  // end game (win or loss)
  function endGame(isVictory) {
    if (!gameActive) return; // already ended

    gameActive = false;
    if (isVictory) {
      gameMessageSpan.innerText = `🎉 VICTORY! You guessed "${currentWord}"! 🎉`;
      // final score refresh (bonus)
      refreshScoreUI();
      // save current score as previous for this player
      saveCurrentScoreAsPreviousForPlayer(currentPlayerId);
      // update highest possible
      updateGlobalHighestScore();
      // also ensure highest display updates
      highestScoreDisplay.innerText = highestScore;
    } else {
      // lose: incorrect guesses reached limit
      gameMessageSpan.innerText = `💀 GAME OVER! The word was "${currentWord}". Better luck next time! 💀`;
      // save current score as previous (score may be 0)
      saveCurrentScoreAsPreviousForPlayer(currentPlayerId);
      updateGlobalHighestScore();   // ensure highest is updated even if score is low (does nothing)
      highestScoreDisplay.innerText = highestScore;
    }
    // disable further guesses effect in submit logic (by checking gameActive)
  }

  // process guess (letter or whole word)
  function processGuess(inputRaw) {
    if (!gameActive) {
      gameMessageSpan.innerText = "⛔ Game over! Please click RESTART to play again.";
      return;
    }
    if (!currentWordObj) {
      gameMessageSpan.innerText = "⚠️ Error: no active word. Restart game.";
      return;
    }

    const guess = inputRaw.trim().toUpperCase();
    if (guess === "") {
      gameMessageSpan.innerText = "❓ Please enter a letter or full word!";
      return;
    }

    // FULL WORD GUESS
    if (guess.length > 1) {
      if (guess === currentWord) {
        // correct word guess: reveal all letters and win instantly
        for (let ch of currentWord) {
          guessedLetters.add(ch);
        }
        updateUI();
        endGame(true);
      } else {
        // wrong whole word guess: penalize as one incorrect attempt
        incorrectGuesses++;
        updateUI();
        const remaining = maxAttempts - incorrectGuesses;
        gameMessageSpan.innerText = `❌ Wrong word guess! "${guess}" is not correct. ${remaining} attempts left.`;
        if (incorrectGuesses >= maxAttempts) {
          endGame(false);
        } else {
          // check if after penalty we have a win? but win impossible because word not fully guessed
        }
      }
      guessInput.value = "";
      guessInput.focus();
      return;
    }

    // SINGLE LETTER guess
    const letter = guess;
    if (!/[A-Z]/i.test(letter)) {
      gameMessageSpan.innerText = "🔤 Please enter a valid letter (A-Z).";
      guessInput.value = "";
      guessInput.focus();
      return;
    }

    if (guessedLetters.has(letter)) {
      gameMessageSpan.innerText = `ℹ️ Letter "${letter}" already guessed! Try another.`;
      guessInput.value = "";
      guessInput.focus();
      return;
    }

    // check if letter in word
    if (currentWord.includes(letter)) {
      guessedLetters.add(letter);
      updateUI();
      gameMessageSpan.innerText = `✅ Great! "${letter}" is in the word!`;
      // check win condition after update
      if (checkWin()) {
        endGame(true);
      } else {
        // no penalty, just update
      }
    } else {
      // incorrect guess
      incorrectGuesses++;
      updateUI();
      const remaining = maxAttempts - incorrectGuesses;
      gameMessageSpan.innerText = `❌ "${letter}" is not in the word. ${remaining} attempts left.`;
      if (incorrectGuesses >= maxAttempts) {
        endGame(false);
      }
    }

    guessInput.value = "";
    guessInput.focus();
  }

  // reset / new game: picks new random word, reset state
  function startNewGame() {
    // pick new random word
    currentWordObj = getRandomWordObj();
    currentWord = currentWordObj.word.toUpperCase();
    hintTextSpan.innerText = currentWordObj.hint;
    guessedLetters.clear();
    incorrectGuesses = 0;
    gameActive = true;
    // Score recompute based on remaining attempts (max attempts = 6 => initial score 60)
    refreshScoreUI();   // sets currentScore = 60 initially
    
    // BUT: previous score should stay as it is from player storage (already loaded)
    // However if we restart mid-game, we should NOT erase previousScore but keep it. 
    // After restart, currentScore will be fresh 60, but when we eventually win/lose, save that as previous.
    // Also when restarting manually, we should not change previousScore in localStorage.
    // ensure we reflect currentScore after reset
    currentScoreDisplay.innerText = computeScoreFromAttempts();
    updateUI();
    gameMessageSpan.innerText = "🔄 New game! Start guessing letters or the whole word.";
    // clear any lingering message styles
    guessInput.value = "";
    guessInput.focus();
  }

  // full restart (preserve player ID and scores logic, reset all game state)
  function handleRestart() {
    startNewGame();
    // Also ensure that highest score display persists, but we keep global highest as is.
    // But if we want to reset the 'current' game only, that's fine.
    // Also in case game ended, we need to re-activate. startNewGame does that.
  }

  // update player profile & reload previous score for new player
  function updatePlayerProfile() {
    let newPlayerId = playerIdInput.value.trim();
    if (newPlayerId === "") {
      newPlayerId = "Guest";
      playerBadgeSpan.innerHTML = "🎮 Guest Mode";
    } else {
      playerBadgeSpan.innerHTML = `👤 ${escapeHtml(newPlayerId)}`;
    }
    currentPlayerId = newPlayerId;
    // load previous score for this player from localStorage
    loadPrevScoreForPlayer(currentPlayerId);
    // ALSO: we might want to reset current score? but only after restart? 
    // According to game design, when you change player id, the previous score shown should be that player's last score.
    // But current game score is still based on ongoing game (or we can reset game automatically? Better auto-restart? 
    // For clarity: When player ID changes, we restart the game to avoid confusion.
    if (gameActive === false || true) {
      // Better to restart game for fairness with new player identity
      startNewGame();
      // reload previous score for the new player (already loaded)
      gameMessageSpan.innerText = `🎮 Switched to ${currentPlayerId}. New game started! Previous score: ${previousScore}`;
    } else {
      startNewGame();
    }
    // ensure highest global still shown
    highestScoreDisplay.innerText = highestScore;
  }

  // simple escape for player name
  function escapeHtml(str) {
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  // ----------------------------- EVENT LISTENERS ----------------------------
  submitBtn.addEventListener("click", () => {
    const rawGuess = guessInput.value;
    processGuess(rawGuess);
  });

  guessInput.addEventListener("keypress", (e) => {
    if (e.key === "Enter") {
      e.preventDefault();
      const rawGuess = guessInput.value;
      processGuess(rawGuess);
    }
  });

  restartBtn.addEventListener("click", () => {
    handleRestart();
  });

  playerIdInput.addEventListener("change", () => {
    updatePlayerProfile();
  });

  // initialization
  function init() {
    loadHighestScoreFromStorage();
    // default player
    currentPlayerId = "Guest";
    playerBadgeSpan.innerHTML = "🎮 Guest Mode";
    playerIdInput.value = "";
    loadPrevScoreForPlayer("Guest");
    startNewGame();  // picks word, reset state, sets currentScore to 60, update UI
    highestScoreDisplay.innerText = highestScore;
    prevScoreDisplay.innerText = previousScore;
    currentScoreDisplay.innerText = currentScore;
  }

  init();
</script>
</body>
</html>
